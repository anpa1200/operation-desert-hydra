version: "3"
# Overlay: adds Kibana + exposes Elasticsearch 9200 to the host.
# Run alongside the main stack:
#   docker compose -f docker-compose.yml -f docker-compose.kibana.yml up -d
#
# Kibana UI : http://localhost:5601  (login: elastic / $ELASTIC_PASSWORD)
# ES API    : http://localhost:9200  (also reachable from Vagrant VM at 192.168.56.1:9200)

services:
  elasticsearch:
    ports:
      - "9200:9200"   # expose to host for Winlogbeat (VM) and curl

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_SERVICEACCOUNTTOKEN: AAEAAWVsYXN0aWMva2liYW5hL2tpYmFuYV9sYWJfdG9rZW46SVpiamQyNnRTR3FDUFZCUUpuNHYxQQ
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: always

networks:
  default:
    name: opencti_network
    external: true
